<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アトリエ卓 調合ツール</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #d9dce7;
      --text: #20253a;
      --muted: #66708a;
      --accent: #4f46e5;
      --chip: #f1f3f9;
      --good: #0f766e;
      --danger: #b42318;
      --danger-bg: #fff3f3;
      --danger-line: #f1a5a5;
      --shadow: 0 8px 24px rgba(18, 28, 45, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header { margin-bottom: 20px; }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fafbff;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
    }

    .panel-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .search-box {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .recipe-list {
      max-height: 72vh;
      overflow: auto;
    }

    .recipe-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .recipe-item:hover { background: #fafbff; }

    .recipe-item.active {
      background: #eef0ff;
      border-left: 4px solid var(--accent);
      padding-left: 12px;
    }

    .recipe-item.recipe-shortage {
      background: #fff1f1;
    }

    .recipe-item.recipe-shortage:hover {
      background: #ffe7e7;
    }

    .recipe-item.recipe-shortage .recipe-name {
      color: var(--danger);
    }

    .recipe-name {
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--chip);
      color: #33405f;
      font-size: 15px;
      line-height: 1;
      white-space: nowrap;
    }

    .trait-group {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .trait-chip {
      padding: 0 6px;
      border-radius: 8px;
      cursor: help;
    }

    .selected-chip {
      gap: 6px;
      padding-right: 4px;
      background: #e9edff;
      color: #26327a;
      font-size: 13px;
    }

    .chip-remove {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: rgba(38, 50, 122, 0.12);
      color: #26327a;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .recipe-detail { padding: 18px; }

    .recipe-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .recipe-top .meta-row + .meta-row {
      margin-top: 8px;
    }

    .detail-name {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quality-display {
      text-align: right;
      min-width: 140px;
    }

    .quality-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .quality-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .quality-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .craft-count-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .craft-count-input {
      width: 72px;
      min-height: 34px;
      padding: 0 8px;
      text-align: right;
      border-radius: 10px;
      font-size: 13px;
    }

    .craft-button {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid #cfd5ff;
      border-radius: 10px;
      background: #eef0ff;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .craft-button:hover {
      background: #e3e7ff;
    }

    .craft-button.copied {
      background: #ecfdf3;
      border-color: #b7e4c7;
      color: #0f766e;
    }

    .detail-section { margin-top: 20px; }

    .detail-section h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .slot-grid {
      display: grid;
      gap: 12px;
    }

    .slot-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .slot-card.slot-shortage {
      border-color: var(--danger-line);
      background: var(--danger-bg);
    }

    .slot-card.slot-shortage .slot-title {
      color: var(--danger);
    }

    .slot-card.slot-complete {
      border-color: #b7d8c0;
      background: #f6fff8;
    }

    .slot-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .slot-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .slot-desc {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .candidate-meta {
      margin-top: 10px;
      color: var(--good);
      font-size: 13px;
      font-weight: 700;
    }

    .selected-area {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fafbff;
    }

    .selected-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .candidate-list {
      margin-top: 12px;
      overflow-y: auto;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      max-height: 290px;
      position: relative;
      scrollbar-gutter: stable;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      background: #fafbff;
      z-index: 3;
      white-space: nowrap;
      box-shadow: 0 1px 0 var(--line);
    }

    tr.candidate-row {
      cursor: pointer;
    }

    tr.candidate-row:hover td {
      background: #f7f9ff;
    }

    tr.candidate-row.disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    tr.candidate-row.disabled:hover td {
      background: transparent;
    }

    .tooltip {
      position: fixed;
      z-index: 1000;
      max-width: 360px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
      pointer-events: none;
      display: none;
      white-space: normal;
    }

    .tooltip-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .tooltip-category {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .empty, .loading, .error {
      padding: 18px;
      color: var(--muted);
    }

    .selected-empty {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1;
    }

    .error { color: var(--danger); }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
      .recipe-list { max-height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>アトリエ卓 調合ツール</h1>
      <div class="sub">
        レシピを選ぶと、各素材枠に入れられる候補素材を一覧表示します。候補行をクリックすると素材が追加されます。同じ素材を複数回選ぶこともできます。
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">レシピ一覧</h2>
          <div class="panel-sub">検索で絞り込みできます</div>
        </div>
        <div class="search-box">
          <input id="recipeSearch" type="text" placeholder="例: フラム / ポーション / Bランク" />
        </div>
        <div id="recipeList" class="recipe-list">
          <div class="loading">レシピを読み込んでいます...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">レシピ詳細</h2>
          <div class="panel-sub">候補行をクリックして素材を追加します。特性にマウスオーバーすると説明が表示されます。</div>
        </div>
        <div id="recipeDetail" class="recipe-detail">
          <div class="loading">データを読み込んでいます...</div>
        </div>
      </section>
    </div>
  </div>

  <div id="tooltip" class="tooltip"></div>

  <script>
    const MATERIAL_SHEET_ID = '1zf4G3sIrFntv7DVcKhf0aZkQXo-ayiRuWFL9L2yfCr4';
    const MATERIAL_SHEET_NAME = '素材';
    const RECIPE_SHEET_ID = '1zf4G3sIrFntv7DVcKhf0aZkQXo-ayiRuWFL9L2yfCr4';
    const RECIPE_SHEET_NAME = 'レシピ';
    const TRAIT_SHEET_ID = '1zf4G3sIrFntv7DVcKhf0aZkQXo-ayiRuWFL9L2yfCr4';
    const TRAIT_SHEET_NAME = '特性';
    const PRODUCT_SHEET_ID = '1zf4G3sIrFntv7DVcKhf0aZkQXo-ayiRuWFL9L2yfCr4';
    const PRODUCT_SHEET_NAME = '調合アイテム';

    // ローカルHTML(file://)でもCORSに引っかからないように、Google Visualization API の JSONP で読み込みます。
    // URLに毎回違う _fresh を付けることで、リロードごとに新しく取得します。

    const state = {
      materials: [],
      recipes: [],
      filteredRecipes: [],
      selectedRecipeIndex: 0,
      recipeSearch: '',
      selectedMaterials: {},
      craftMultiplier: 1,
      traitMap: {},
      productMap: {}
    };

    const els = {
      recipeSearch: document.getElementById('recipeSearch'),
      recipeList: document.getElementById('recipeList'),
      recipeDetail: document.getElementById('recipeDetail'),
      tooltip: document.getElementById('tooltip')
    };

    function normalizeText(value) {
      return String(value ?? '').trim();
    }

    function toNumber(value) {
      const num = Number(String(value ?? '').replace(/,/g, '').trim());
      return Number.isFinite(num) ? num : 0;
    }

    function splitTags(value) {
      return normalizeText(value)
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function isCategoryRequirement(value) {
      return /^〈.+〉$/.test(normalizeText(value));
    }

    function isVisibleRecipe(value) {
      const text = String(value ?? '').trim().toUpperCase();
      return text === 'TRUE' || text === '1' || text === 'YES';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function parseMaterial(row) {
      const name = normalizeText(row['アイテム名']);
      const color = normalizeText(row['色']);
      const rank = normalizeText(row['ランク']);
      const quality = toNumber(row['品質']);
      const count = toNumber(row['個数']);

      return {
        key: [name, color, rank, quality, count].join('||'),
        name,
        price: toNumber(row['価格']),
        color,
        rank,
        categories: splitTags(row['カテゴリ']),
        quality,
        traits: splitTags(row['特性']),
        count
      };
    }

    function parseRecipe(row) {
      const slots = [];
      for (let i = 1; i <= 5; i += 1) {
        const requirement = normalizeText(row[`素材${i}`]);
        const count = toNumber(row[`個数${i}`]);
        if (!requirement) continue;

        slots.push({
          slotNo: i,
          requirement,
          requiredCount: count || 1,
          type: isCategoryRequirement(requirement) ? 'category' : 'name'
        });
      }

      return {
        name: normalizeText(row['アイテム名']),
        rank: normalizeText(row['ランク']),
        craftCount: toNumber(row['作成個数']),
        difficulty: toNumber(row['難易度']),
        traits: splitTags(row['発現特性']),
        manifestValue: toNumber(row['発現値']),
        notes: normalizeText(row['備考']),
        isVisible: isVisibleRecipe(row['表示']),
        slots
      };
    }

    function parseTrait(row) {
      return {
        name: normalizeText(row['特性名']),
        category: normalizeText(row['カテゴリ']),
        effect: normalizeText(row['効果'])
      };
    }

    function parseProduct(row) {
      return {
        name: normalizeText(row['アイテム名']),
        categories: splitTags(row['カテゴリ'])
      };
    }

    function getCandidates(slot) {
      const candidates = state.materials.filter(material => {
        if (slot.type === 'category') {
          return material.categories.includes(slot.requirement);
        }
        return material.name === slot.requirement;
      });

      return [...candidates].sort((a, b) => {
        if (b.quality !== a.quality) return b.quality - a.quality;
        if (b.count !== a.count) return b.count - a.count;
        return a.name.localeCompare(b.name, 'ja');
      });
    }

    function getRecipeKey(recipe) {
      return recipe.name;
    }

    function getSlotKey(recipe, slot) {
      return `${getRecipeKey(recipe)}::slot${slot.slotNo}`;
    }

    function getSelectedMaterials(recipe, slot) {
      return state.selectedMaterials[getSlotKey(recipe, slot)] || [];
    }

    function getCraftMultiplier() {
      const value = Number(state.craftMultiplier);
      return Number.isFinite(value) && value > 0 ? Math.floor(value) : 1;
    }

    function getRequiredCountForSlot(slot) {
      return slot.requiredCount * getCraftMultiplier();
    }

    function getUsedCountForMaterial(recipe, materialKey) {
      return recipe.slots.reduce((sum, slot) => {
        return sum + getSelectedMaterials(recipe, slot).filter(key => key === materialKey).length;
      }, 0);
    }

    function canAddMaterial(recipe, slot, material) {
      const selected = getSelectedMaterials(recipe, slot);
      if (selected.length >= getRequiredCountForSlot(slot)) {
        return false;
      }
      const usedCount = getUsedCountForMaterial(recipe, material.key);
      return usedCount < material.count;
    }

    function addMaterialToSlot(recipe, slot, materialKey) {
      const slotKey = getSlotKey(recipe, slot);
      const current = getSelectedMaterials(recipe, slot);
      state.selectedMaterials[slotKey] = [...current, materialKey];
    }

    function removeMaterialFromSlot(recipe, slot, indexToRemove) {
      const slotKey = getSlotKey(recipe, slot);
      const current = getSelectedMaterials(recipe, slot);
      state.selectedMaterials[slotKey] = current.filter((_, index) => index !== indexToRemove);
    }

    function getMaterialByKey(materialKey) {
      return state.materials.find(material => material.key === materialKey) || null;
    }

    function getAllSelectedMaterials(recipe) {
      return recipe.slots
        .flatMap(slot => getSelectedMaterials(recipe, slot))
        .map(getMaterialByKey)
        .filter(Boolean);
    }

    function calculateAverageQuality(recipe) {
      const selected = getAllSelectedMaterials(recipe);
      if (!selected.length) return null;
      const total = selected.reduce((sum, material) => sum + material.quality, 0);
      return total / selected.length;
    }

    function getSelectedCount(recipe) {
      return getAllSelectedMaterials(recipe).length;
    }

    function getRequiredCount(recipe) {
      return recipe.slots.reduce((sum, slot) => sum + getRequiredCountForSlot(slot), 0);
    }

    function getAvailableCountForSlot(slot) {
      return getCandidates(slot).reduce((sum, material) => sum + material.count, 0);
    }

    function slotHasShortage(slot) {
      return getAvailableCountForSlot(slot) < getRequiredCountForSlot(slot);
    }

    function recipeHasShortage(recipe) {
      return recipe.slots.some(slotHasShortage);
    }

    function renderSimpleChips(values) {
      if (!values.length) return '';
      return values.map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('');
    }

    function renderTraitChips(values) {
      if (!values.length) return '';
      return values.map(raw => {
        const value = raw.trim();
        const trait = state.traitMap[value] || {};
        const category = trait.category || '';
        const effect = trait.effect || '';
        return `<span class="chip trait-chip" data-trait-name="${escapeHtml(value)}" data-trait-category="${escapeHtml(category)}" data-trait-effect="${escapeHtml(effect)}">${escapeHtml(value)}</span>`;
      }).join('');
    }

    function renderRecipeTraitGroup(recipe) {
      if (!recipe.traits.length) return '';
      const cleaned = recipe.traits.map(v => v.trim()).filter(Boolean);
      return `<span class="chip"><span>発現特性:</span><span class="trait-group">${renderTraitChips(cleaned)}</span></span>`;
    }

    function renderSelectedChips(recipe, slot) {
      const selectedKeys = getSelectedMaterials(recipe, slot);
      if (!selectedKeys.length) {
        return '<span class="selected-empty">まだ選択されていません。</span>';
      }

      return selectedKeys.map((key, index) => {
        const material = getMaterialByKey(key);
        if (!material) return '';
        return `<span class="chip selected-chip">${escapeHtml(material.name)} / 品質 ${material.quality}<button type="button" class="chip-remove" data-slot-key="${escapeHtml(getSlotKey(recipe, slot))}" data-index="${index}">×</button></span>`;
      }).join('');
    }

    function buildSelectedMaterialsText(recipe) {
      const selected = getAllSelectedMaterials(recipe);

      if (!selected.length) {
        return `${recipe.name} | 素材なし`;
      }

      const grouped = {};
      selected.forEach(material => {
        const traitsText = material.traits.length ? material.traits.join(',') : '-';
        const groupKey = [material.name, material.quality, traitsText].join('||');

        if (!grouped[groupKey]) {
          grouped[groupKey] = {
            name: material.name,
            quality: material.quality,
            traitsText,
            count: 0
          };
        }

        grouped[groupKey].count += 1;
      });

      const materialsText = Object.values(grouped)
        .map(material => `${material.name}(品質${material.quality}/特性:${material.traitsText})x${material.count}`)
        .join(' | ');
      
      const traitText = recipe.traits.length
        ? recipe.traits.join(',')
        : '-';

      const manifestText = recipe.traits.length
        ? `発現特性:${recipe.traits.join(',')}(発現値:${recipe.manifestValue || 0})`
        : '';

      const quality = calculateAverageQuality(recipe);

      const multiplier = getCraftMultiplier();
      const craftedCount = (recipe.craftCount || 1) * multiplier;

      return `${recipe.name}(難易度:${recipe.difficulty || '-'})`
        + ` | 作成個数:${craftedCount}`
        + (multiplier > 1 ? `(${multiplier}回分)` : '')
        + (manifestText ? ` | ${manifestText}` : '')
        + ` | 完成品質:${quality === null ? '-' : quality.toFixed(1)}`
        + ` | ${materialsText}`;
    }

    async function copySelectedMaterials(recipe, buttonEl) {
      const text = buildSelectedMaterialsText(recipe);

      try {
        await navigator.clipboard.writeText(text);

        const originalText = buttonEl.textContent;
        buttonEl.textContent = 'コピーしました';
        buttonEl.classList.add('copied');

        window.setTimeout(() => {
          buttonEl.textContent = originalText;
          buttonEl.classList.remove('copied');
        }, 1200);
      } catch (error) {
        console.error(error);
        alert('コピーに失敗しました。');
      }
    }

    function showTooltip(event) {
      const target = event.currentTarget;
      const name = target.dataset.traitName || '';
      const category = target.dataset.traitCategory || '';
      const effect = target.dataset.traitEffect || '説明がありません。';

      els.tooltip.innerHTML = `<div class="tooltip-title">${escapeHtml(name)}</div>${category ? `<div class="tooltip-category">カテゴリ: ${escapeHtml(category)}</div>` : ''}<div>${escapeHtml(effect)}</div>`;
      els.tooltip.style.display = 'block';
      moveTooltip(event);
    }

    function moveTooltip(event) {
      if (els.tooltip.style.display !== 'block') return;
      const offset = 14;
      const rect = els.tooltip.getBoundingClientRect();
      let left = event.clientX + offset;
      let top = event.clientY + offset;

      if (left + rect.width > window.innerWidth - 12) {
        left = window.innerWidth - rect.width - 12;
      }
      if (top + rect.height > window.innerHeight - 12) {
        top = event.clientY - rect.height - offset;
      }
      if (top < 12) top = 12;
      if (left < 12) left = 12;

      els.tooltip.style.left = `${left}px`;
      els.tooltip.style.top = `${top}px`;
    }

    function hideTooltip() {
      els.tooltip.style.display = 'none';
    }

    function attachTooltipEvents() {
      document.querySelectorAll('.trait-chip').forEach(chip => {
        chip.addEventListener('mouseenter', showTooltip);
        chip.addEventListener('mousemove', moveTooltip);
        chip.addEventListener('mouseleave', hideTooltip);
      });
    }

    function renderRecipeList() {
      if (!state.filteredRecipes.length) {
        els.recipeList.innerHTML = '<div class="empty">該当するレシピがありません。</div>';
        return;
      }

      els.recipeList.innerHTML = state.filteredRecipes.map((recipe, index) => {
        const isActive = index === state.selectedRecipeIndex;
        const shortage = recipeHasShortage(recipe);
        const className = ['recipe-item', isActive ? 'active' : '', shortage ? 'recipe-shortage' : ''].filter(Boolean).join(' ');

        const productInfo = state.productMap[recipe.name] || null;

        const productCategoryChips = productInfo?.categories?.length
          ? `<div class="meta-row">${renderSimpleChips(productInfo.categories)}</div>`
          : '';

        return `
          <div class="${className}" data-index="${index}">
            <div class="recipe-name">
              ${escapeHtml(recipe.name)}
              ${recipe.rank ? `<span class="chip">${escapeHtml(recipe.rank)}</span>` : ''}
            </div>
            ${productCategoryChips}
          </div>
        `;
      }).join('');

      document.querySelectorAll('.recipe-item').forEach(item => {
        item.addEventListener('click', () => {
          state.selectedRecipeIndex = Number(item.dataset.index);
          renderRecipeList();
          renderRecipeDetail();
        });
      });
    }

    function renderRecipeDetail() {
      const recipe = state.filteredRecipes[state.selectedRecipeIndex];
      if (!recipe) {
        els.recipeDetail.innerHTML = '<div class="empty">表示できるレシピがありません。</div>';
        return;
      }

      const averageQuality = calculateAverageQuality(recipe);
      const selectedCount = getSelectedCount(recipe);
      const requiredCount = getRequiredCount(recipe);
      const shortage = recipeHasShortage(recipe);

      const slotHtml = recipe.slots.map(slot => {
        const candidates = getCandidates(slot);
        const slotShortage = slotHasShortage(slot);
        const selectedKeys = getSelectedMaterials(recipe, slot);
        const requiredCountForSlot = getRequiredCountForSlot(slot);
        const slotComplete = selectedKeys.length >= requiredCountForSlot;

        const rows = candidates.map(candidate => {
          const disabled = !canAddMaterial(recipe, slot, candidate);
          const rowClass = ['candidate-row', disabled ? 'disabled' : ''].filter(Boolean).join(' ');
          const usedCount = getUsedCountForMaterial(recipe, candidate.key);

          return `<tr class="${rowClass}" data-slot-key="${escapeHtml(getSlotKey(recipe, slot))}" data-material-key="${escapeHtml(candidate.key)}"><td>${escapeHtml(candidate.name)}</td><td>${escapeHtml(candidate.color || '-')}</td><td>${escapeHtml(candidate.rank || '-')}</td><td>${candidate.quality}</td><td>${usedCount} / ${candidate.count}</td><td>${candidate.categories.length ? renderSimpleChips(candidate.categories) : '-'}</td><td>${candidate.traits.length ? renderTraitChips(candidate.traits) : '-'}</td></tr>`;
        }).join('');

        const slotCardClass = ['slot-card', slotShortage ? 'slot-shortage' : '', slotComplete ? 'slot-complete' : ''].filter(Boolean).join(' ');

        return `<div class="${slotCardClass}"><div class="slot-head"><div><div class="slot-title">素材枠${slot.slotNo}: ${escapeHtml(slot.requirement)}</div><div class="slot-desc">必要数 ${requiredCountForSlot}${getCraftMultiplier() > 1 ? `（基本 ${slot.requiredCount} × ${getCraftMultiplier()}回分）` : ''} / 判定方式: ${slot.type === 'category' ? 'カテゴリ一致' : 'アイテム名一致'}</div></div><div class="candidate-meta">選択済み ${selectedKeys.length} / ${requiredCountForSlot}</div></div><div class="selected-area"><div class="selected-title">選択済み素材</div><div class="meta-row">${renderSelectedChips(recipe, slot)}</div></div><div class="candidate-list"><table><thead><tr><th>アイテム名</th><th>色</th><th>ランク</th><th>品質</th><th>使用数 / 所持数</th><th>カテゴリ</th><th>特性</th></tr></thead><tbody>${rows || '<tr><td colspan="7" class="empty">該当素材がありません。</td></tr>'}</tbody></table></div></div>`;
      }).join('');

      const productInfo = state.productMap[recipe.name] || null;
      const productCategoryChips = productInfo?.categories?.length
        ? `<div class="meta-row">${renderSimpleChips(productInfo.categories)}</div>`
        : '';

      const topChips = [
        recipe.craftCount ? `<span class="chip">作成個数 ${recipe.craftCount}</span>` : '',
        recipe.difficulty ? `<span class="chip">難易度 ${recipe.difficulty}</span>` : '',
        renderRecipeTraitGroup(recipe),
        recipe.manifestValue ? `<span class="chip">発現値 ${recipe.manifestValue}</span>` : '',
        `<span class="chip">選択済み ${selectedCount} / ${requiredCount}</span>`
      ].filter(Boolean).join('');

      const qualityDisplay = `<div class="quality-display"><div class="quality-label">完成品質</div><div class="quality-value">${averageQuality === null ? '-' : averageQuality.toFixed(1)}</div><div class="quality-actions"><label class="craft-count-control" for="craftMultiplierInput">作成回数<input id="craftMultiplierInput" class="craft-count-input" type="number" min="1" step="1" value="${getCraftMultiplier()}"></label><button type="button" id="copySelectedButton" class="craft-button">調合</button></div></div>`;

      const headerHtml = `
        <div class="recipe-top">
          <div>
            <h1 class="detail-name">
              ${escapeHtml(recipe.name)}
              ${recipe.rank ? `<span class="chip">${escapeHtml(recipe.rank)}</span>` : ''}
              ${shortage ? '<span class="chip">候補不足あり</span>' : ''}
            </h1>

            ${productCategoryChips}

            <div class="meta-row">${topChips}</div>
          </div>

          ${qualityDisplay}
        </div>
      `;

      els.recipeDetail.innerHTML = `
        ${headerHtml}
        ${recipe.notes ? `<div class="detail-section"><h2>備考</h2><div>${escapeHtml(recipe.notes)}</div></div>` : ''}
        <div class="detail-section">
          <h2>素材候補</h2>
          <div class="slot-grid">${slotHtml || '<div class="empty">素材枠がありません。</div>'}</div>
        </div>
      `;

      document.querySelectorAll('.candidate-row').forEach(row => {
        if (row.classList.contains('disabled')) return;
        row.addEventListener('click', () => {
          const slotKey = row.dataset.slotKey;
          const materialKey = row.dataset.materialKey;
          const targetSlot = recipe.slots.find(slot => getSlotKey(recipe, slot) === slotKey);
          const targetMaterial = getMaterialByKey(materialKey);
          if (!targetSlot || !targetMaterial) return;
          if (!canAddMaterial(recipe, targetSlot, targetMaterial)) return;
          addMaterialToSlot(recipe, targetSlot, materialKey);
          renderRecipeDetail();
        });
      });

      document.querySelectorAll('.chip-remove').forEach(button => {
        button.addEventListener('click', event => {
          event.stopPropagation();
          const slotKey = button.dataset.slotKey;
          const index = Number(button.dataset.index);
          const targetSlot = recipe.slots.find(slot => getSlotKey(recipe, slot) === slotKey);
          if (!targetSlot) return;
          removeMaterialFromSlot(recipe, targetSlot, index);
          renderRecipeDetail();
        });
      });

      const copyButton = document.getElementById('copySelectedButton');
      if (copyButton) {
        copyButton.addEventListener('click', () => {
          copySelectedMaterials(recipe, copyButton);
        });
      }

      const craftMultiplierInput = document.getElementById('craftMultiplierInput');
      if (craftMultiplierInput) {
        craftMultiplierInput.addEventListener('input', event => {
          const value = Math.max(1, Math.floor(Number(event.target.value) || 1));
          state.craftMultiplier = value;
          event.target.value = value;
          renderRecipeList();
          renderRecipeDetail();
        });
      }

      attachTooltipEvents();
    }

    function applyRecipeSearch() {
      const q = state.recipeSearch.toLowerCase();

      state.filteredRecipes = state.recipes.filter(recipe => {
        if (!q) return true;

        const productInfo = state.productMap[recipe.name] || null;
        const categoryMatch = productInfo?.categories?.some(category =>
          category.toLowerCase().includes(q)
        );

        return recipe.name.toLowerCase().includes(q)
          || recipe.rank.toLowerCase().includes(q)
          || recipe.traits.some(trait => trait.toLowerCase().includes(q))
          || recipe.slots.some(slot => slot.requirement.toLowerCase().includes(q))
          || Boolean(categoryMatch);
      });

      state.selectedRecipeIndex = 0;
      renderRecipeList();
      renderRecipeDetail();
    }

    function getGvizCellValue(cell) {
      return cell ? (cell.f ?? cell.v ?? '') : '';
    }

    function gvizTableToRows(table, expectedHeaders = []) {
      const rows = table.rows || [];
      let headers = (table.cols || []).map((col, index) => {
        return normalizeText(col.label || col.id || `列${index + 1}`);
      });

      let dataRows = rows;
      const hasExpectedHeader = expectedHeaders.some(header => headers.includes(header));

      // Google Visualization API は、環境や推測結果によって
      // 1行目を列名として扱わず、A/B/C列として返すことがある。
      // その場合は1行目をヘッダーとして読み直す。
      if (!hasExpectedHeader && rows.length) {
        const firstRowHeaders = (rows[0].c || []).map(cell => normalizeText(getGvizCellValue(cell)));
        const firstRowHasExpectedHeader = expectedHeaders.some(header => firstRowHeaders.includes(header));

        if (firstRowHasExpectedHeader) {
          headers = firstRowHeaders;
          dataRows = rows.slice(1);
        }
      }

      return dataRows.map(row => {
        const obj = {};
        (row.c || []).forEach((cell, index) => {
          const key = headers[index];
          if (!key) return;
          obj[key] = getGvizCellValue(cell);
        });
        return obj;
      });
    }

    function loadSheetRows(sheetId, sheetName, expectedHeaders = []) {
      return new Promise((resolve, reject) => {
        const callbackName = `__sheetCallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        const timeoutMs = 15000;

        const cleanup = () => {
          delete window[callbackName];
          script.remove();
        };

        const timeoutId = window.setTimeout(() => {
          cleanup();
          reject(new Error(`${sheetName} の読込がタイムアウトしました。`));
        }, timeoutMs);

        window[callbackName] = data => {
          window.clearTimeout(timeoutId);
          cleanup();

          if (data?.status === 'error') {
            const message = data.errors?.map(error => error.detailed_message || error.message).filter(Boolean).join(' / ') || '不明なエラー';
            reject(new Error(`${sheetName} の読込に失敗しました。${message}`));
            return;
          }

          resolve(gvizTableToRows(data.table || { cols: [], rows: [] }, expectedHeaders));
        };

        const params = new URLSearchParams({
          tqx: `responseHandler:${callbackName}`,
          sheet: sheetName,
          tq: 'select *',
          headers: '1',
          _fresh: `${Date.now()}_${Math.random().toString(36).slice(2)}`
        });

        script.onerror = () => {
          window.clearTimeout(timeoutId);
          cleanup();
          reject(new Error(`${sheetName} の読込に失敗しました。スプレッドシートの公開状態を確認してください。`));
        };

        script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?${params.toString()}`;
        document.head.appendChild(script);
      });
    }

    async function initialize() {
      try {
        const [materialJson, recipeJson, traitJson, productJson] = await Promise.all([
          loadSheetRows(MATERIAL_SHEET_ID, MATERIAL_SHEET_NAME, ['アイテム名', 'カテゴリ', '品質', '特性']),
          loadSheetRows(RECIPE_SHEET_ID, RECIPE_SHEET_NAME, ['アイテム名', '素材1', '表示']),
          loadSheetRows(TRAIT_SHEET_ID, TRAIT_SHEET_NAME, ['特性名', 'カテゴリ', '効果']),
          loadSheetRows(PRODUCT_SHEET_ID, PRODUCT_SHEET_NAME, ['アイテム名', 'カテゴリ'])
        ]);

        state.materials = materialJson.map(parseMaterial).filter(row => row.name);
        state.recipes = recipeJson
          .map(parseRecipe)
          .filter(row => row.name && row.isVisible);

        state.traitMap = traitJson
          .map(parseTrait)
          .filter(row => row.name)
          .reduce((acc, row) => {
            acc[row.name] = row;
            return acc;
          }, {});

        state.productMap = productJson
          .map(parseProduct)
          .filter(row => row.name)
          .reduce((acc, row) => {
            acc[row.name] = row;
            return acc;
          }, {});

        applyRecipeSearch();
      } catch (error) {
        console.error(error);
        els.recipeList.innerHTML = '<div class="error">レシピデータの読込に失敗しました。</div>';
        els.recipeDetail.innerHTML = `<div class="error">スプレッドシートの公開状態、シート名、列名を確認してください。<br>詳細: ${escapeHtml(error.message || error)}</div>`;
      }
    }

    els.recipeSearch.addEventListener('input', event => {
      state.recipeSearch = event.target.value.trim();
      applyRecipeSearch();
    });

    initialize();
  </script>
