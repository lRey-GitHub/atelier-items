<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アトリエ卓 レシピ素材選択</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #d9dce7;
      --text: #20253a;
      --muted: #66708a;
      --accent: #4f46e5;
      --accent-soft: #eef0ff;
      --chip: #f1f3f9;
      --good: #0f766e;
      --danger: #b42318;
      --danger-bg: #fff3f3;
      --danger-line: #f1a5a5;
      --shadow: 0 8px 24px rgba(18, 28, 45, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header { margin-bottom: 20px; }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fafbff;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
    }

    .panel-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .search-box {
      padding: 16px;
      border-bottom: 1px solid var(--line);
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .recipe-list {
      max-height: 72vh;
      overflow: auto;
    }

    .recipe-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }

    .recipe-item:hover { background: #fafbff; }

    .recipe-item.active {
      background: var(--accent-soft);
      border-left: 4px solid var(--accent);
      padding-left: 12px;
    }

    .recipe-item.recipe-shortage {
      background: #fff1f1;
    }

    .recipe-item.recipe-shortage:hover {
      background: #ffe7e7;
    }

    .recipe-item.recipe-shortage .recipe-name {
      color: var(--danger);
    }

    .recipe-name {
      font-weight: 700;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--chip);
      color: #33405f;
      font-size: 15px;
      line-height: 1;
      white-space: nowrap;
    }

    .selected-chip {
      gap: 6px;
      padding-right: 4px;
      background: #e9edff;
      color: #26327a;
      font-size: 13px;
    }

    .chip-remove {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: rgba(38, 50, 122, 0.12);
      color: #26327a;
      font-size: 12px;
      line-height: 1;
      padding: 0;
      cursor: pointer;
    }

    .recipe-detail { padding: 18px; }

    .recipe-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .quality-display {
      text-align: right;
      min-width: 120px;
    }

    .quality-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .quality-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .detail-name {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 8px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .detail-section { margin-top: 20px; }

    .detail-section h2 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .slot-grid {
      display: grid;
      gap: 12px;
    }

    .slot-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .slot-card.slot-shortage {
      border-color: var(--danger-line);
      background: var(--danger-bg);
    }

    .slot-card.slot-shortage .slot-title {
      color: var(--danger);
    }

    .slot-card.slot-complete {
      border-color: #b7d8c0;
      background: #f6fff8;
    }

    .slot-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .slot-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }

    .slot-desc {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .candidate-meta {
      margin-top: 10px;
      color: var(--good);
      font-size: 13px;
      font-weight: 700;
    }

    .selected-area {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fafbff;
    }

    .selected-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .candidate-list {
      margin-top: 12px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #fafbff;
      white-space: nowrap;
    }

    tr.candidate-row {
      cursor: pointer;
    }

    tr.candidate-row:hover td {
      background: #f7f9ff;
    }

    tr.candidate-row.disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    tr.candidate-row.disabled:hover td {
      background: transparent;
    }

    .empty, .loading, .error {
      padding: 18px;
      color: var(--muted);
    }

    .error { color: var(--danger); }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
      .recipe-list { max-height: 40vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>アトリエ卓 レシピ素材選択</h1>
      <div class="sub">
        レシピを選ぶと、各素材枠に入れられる候補素材を一覧表示します。候補行をクリックすると素材が追加されます。同じ素材を複数回選ぶこともできます。
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">レシピ一覧</h2>
          <div class="panel-sub">検索で絞り込みできます</div>
        </div>
        <div class="search-box">
          <input id="recipeSearch" type="text" placeholder="例: フラム / ポーション / Bランク" />
        </div>
        <div id="recipeList" class="recipe-list">
          <div class="loading">レシピを読み込んでいます...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">レシピ詳細</h2>
          <div class="panel-sub">候補行をクリックして素材を追加します。選択した素材の品質平均を完成品質として表示します。</div>
        </div>
        <div id="recipeDetail" class="recipe-detail">
          <div class="loading">データを読み込んでいます...</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const MATERIAL_SHEET_ID = '1zf4G3sIrFntv7DVcKhf0aZkQXo-ayiRuWFL9L2yfCr4';
    const MATERIAL_SHEET_NAME = '素材';
    const RECIPE_SHEET_ID = '1zf4G3sIrFntv7DVcKhf0aZkQXo-ayiRuWFL9L2yfCr4';
    const RECIPE_SHEET_NAME = 'レシピ';

    const MATERIAL_URL = `https://opensheet.elk.sh/${MATERIAL_SHEET_ID}/${encodeURIComponent(MATERIAL_SHEET_NAME)}`;
    const RECIPE_URL = `https://opensheet.elk.sh/${RECIPE_SHEET_ID}/${encodeURIComponent(RECIPE_SHEET_NAME)}`;

    const state = {
      materials: [],
      recipes: [],
      filteredRecipes: [],
      selectedRecipeIndex: 0,
      recipeSearch: '',
      selectedMaterials: {}
    };

    const els = {
      recipeSearch: document.getElementById('recipeSearch'),
      recipeList: document.getElementById('recipeList'),
      recipeDetail: document.getElementById('recipeDetail')
    };

    function normalizeText(value) {
      return String(value ?? '').trim();
    }

    function toNumber(value) {
      const num = Number(String(value ?? '').replace(/,/g, '').trim());
      return Number.isFinite(num) ? num : 0;
    }

    function splitTags(value) {
      return normalizeText(value)
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function isCategoryRequirement(value) {
      return /^〈.+〉$/.test(normalizeText(value));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function parseMaterial(row) {
      const name = normalizeText(row['アイテム名']);
      const color = normalizeText(row['色']);
      const rank = normalizeText(row['ランク']);
      const quality = toNumber(row['品質']);
      const count = toNumber(row['個数']);

      return {
        key: [name, color, rank, quality, count].join('||'),
        name,
        price: toNumber(row['価格']),
        color,
        rank,
        categories: splitTags(row['カテゴリ']),
        quality,
        traits: splitTags(row['特性']),
        count
      };
    }

    function parseRecipe(row) {
      const slots = [];
      for (let i = 1; i <= 5; i += 1) {
        const requirement = normalizeText(row[`素材${i}`]);
        const count = toNumber(row[`個数${i}`]);
        if (!requirement) continue;

        slots.push({
          slotNo: i,
          requirement,
          requiredCount: count || 1,
          type: isCategoryRequirement(requirement) ? 'category' : 'name'
        });
      }

      return {
        name: normalizeText(row['アイテム名']),
        rank: normalizeText(row['ランク']),
        craftCount: toNumber(row['作成個数']),
        difficulty: toNumber(row['難易度']),
        traits: splitTags(row['特性']),
        manifestValue: toNumber(row['発現値']),
        notes: normalizeText(row['備考']),
        slots
      };
    }

    function getCandidates(slot) {
      const candidates = state.materials.filter(material => {
        if (slot.type === 'category') {
          return material.categories.includes(slot.requirement);
        }
        return material.name === slot.requirement;
      });

      return [...candidates].sort((a, b) => {
        if (b.quality !== a.quality) return b.quality - a.quality;
        if (b.count !== a.count) return b.count - a.count;
        return a.name.localeCompare(b.name, 'ja');
      });
    }

    function getRecipeKey(recipe) {
      return recipe.name;
    }

    function getSlotKey(recipe, slot) {
      return `${getRecipeKey(recipe)}::slot${slot.slotNo}`;
    }

    function getSelectedMaterials(recipe, slot) {
      return state.selectedMaterials[getSlotKey(recipe, slot)] || [];
    }

    function getUsedCountForMaterial(recipe, materialKey) {
      return recipe.slots.reduce((sum, slot) => {
        return sum + getSelectedMaterials(recipe, slot).filter(key => key === materialKey).length;
      }, 0);
    }

    function canAddMaterial(recipe, slot, material) {
      const selected = getSelectedMaterials(recipe, slot);
      if (selected.length >= slot.requiredCount) {
        return false;
      }
      const usedCount = getUsedCountForMaterial(recipe, material.key);
      return usedCount < material.count;
    }

    function addMaterialToSlot(recipe, slot, materialKey) {
      const slotKey = getSlotKey(recipe, slot);
      const current = getSelectedMaterials(recipe, slot);
      state.selectedMaterials[slotKey] = [...current, materialKey];
    }

    function removeMaterialFromSlot(recipe, slot, indexToRemove) {
      const slotKey = getSlotKey(recipe, slot);
      const current = getSelectedMaterials(recipe, slot);
      state.selectedMaterials[slotKey] = current.filter((_, index) => index !== indexToRemove);
    }

    function getMaterialByKey(materialKey) {
      return state.materials.find(material => material.key === materialKey) || null;
    }

    function getAllSelectedMaterials(recipe) {
      return recipe.slots
        .flatMap(slot => getSelectedMaterials(recipe, slot))
        .map(getMaterialByKey)
        .filter(Boolean);
    }

    function calculateAverageQuality(recipe) {
      const selected = getAllSelectedMaterials(recipe);
      if (!selected.length) return null;
      const total = selected.reduce((sum, material) => sum + material.quality, 0);
      return total / selected.length;
    }

    function getSelectedCount(recipe) {
      return getAllSelectedMaterials(recipe).length;
    }

    function getRequiredCount(recipe) {
      return recipe.slots.reduce((sum, slot) => sum + slot.requiredCount, 0);
    }

    function recipeHasShortage(recipe) {
      return recipe.slots.some(slot => getCandidates(slot).length === 0);
    }

    function renderChips(values) {
      if (!values.length) return '';
      return values.map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('');
    }

    function renderRecipeTraitChip(recipe) {
      if (!recipe.traits.length) return '';
      return `<span class="chip">特性:${escapeHtml(recipe.traits.join(' / '))}</span>`;
    }

    function renderSelectedChips(recipe, slot) {
      const selectedKeys = getSelectedMaterials(recipe, slot);
      if (!selectedKeys.length) {
        return '<div class="empty">まだ選択されていません。</div>';
      }

      return selectedKeys.map((key, index) => {
        const material = getMaterialByKey(key);
        if (!material) return '';
        return `
          <span class="chip selected-chip">
            ${escapeHtml(material.name)} / 品質 ${material.quality}
            <button type="button" class="chip-remove" data-slot-key="${escapeHtml(getSlotKey(recipe, slot))}" data-index="${index}">×</button>
          </span>
        `;
      }).join('');
    }

    function renderRecipeList() {
      if (!state.filteredRecipes.length) {
        els.recipeList.innerHTML = '<div class="empty">該当するレシピがありません。</div>';
        return;
      }

      els.recipeList.innerHTML = state.filteredRecipes.map((recipe, index) => {
        const isActive = index === state.selectedRecipeIndex;
        const shortage = recipeHasShortage(recipe);
        const className = ['recipe-item', isActive ? 'active' : '', shortage ? 'recipe-shortage' : '']
          .filter(Boolean)
          .join(' ');

        return `
          <div class="${className}" data-index="${index}">
            <div class="recipe-name">
              ${escapeHtml(recipe.name)}
              ${recipe.rank ? `<span class="chip">${escapeHtml(recipe.rank)}</span>` : ''}
            </div>
            <div class="meta-row">
              ${recipe.difficulty ? `<span class="chip">難易度 ${recipe.difficulty}</span>` : ''}
              ${recipe.craftCount ? `<span class="chip">作成数 ${recipe.craftCount}</span>` : ''}
              ${shortage ? '<span class="chip">候補不足</span>' : ''}
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.recipe-item').forEach(item => {
        item.addEventListener('click', () => {
          state.selectedRecipeIndex = Number(item.dataset.index);
          renderRecipeList();
          renderRecipeDetail();
        });
      });
    }

    function renderRecipeDetail() {
      const recipe = state.filteredRecipes[state.selectedRecipeIndex];
      if (!recipe) {
        els.recipeDetail.innerHTML = '<div class="empty">表示できるレシピがありません。</div>';
        return;
      }

      const averageQuality = calculateAverageQuality(recipe);
      const selectedCount = getSelectedCount(recipe);
      const requiredCount = getRequiredCount(recipe);
      const shortage = recipeHasShortage(recipe);

      const slotHtml = recipe.slots.map(slot => {
        const candidates = getCandidates(slot);
        const slotShortage = candidates.length === 0;
        const selectedKeys = getSelectedMaterials(recipe, slot);
        const slotComplete = selectedKeys.length >= slot.requiredCount;

        const rows = candidates.map(candidate => {
          const disabled = !canAddMaterial(recipe, slot, candidate);
          const rowClass = ['candidate-row', disabled ? 'disabled' : ''].filter(Boolean).join(' ');
          const usedCount = getUsedCountForMaterial(recipe, candidate.key);

          return `
            <tr class="${rowClass}" data-slot-key="${escapeHtml(getSlotKey(recipe, slot))}" data-material-key="${escapeHtml(candidate.key)}">
              <td>${escapeHtml(candidate.name)}</td>
              <td>${escapeHtml(candidate.color || '-')}</td>
              <td>${escapeHtml(candidate.rank || '-')}</td>
              <td>${candidate.quality}</td>
              <td>${usedCount} / ${candidate.count}</td>
              <td>${candidate.categories.length ? renderChips(candidate.categories) : '-'}</td>
              <td>${candidate.traits.length ? renderChips(candidate.traits) : '-'}</td>
            </tr>
          `;
        }).join('');

        const slotCardClass = ['slot-card', slotShortage ? 'slot-shortage' : '', slotComplete ? 'slot-complete' : '']
          .filter(Boolean)
          .join(' ');

        return `
          <div class="${slotCardClass}">
            <div class="slot-head">
              <div>
                <div class="slot-title">素材枠${slot.slotNo}: ${escapeHtml(slot.requirement)}</div>
                <div class="slot-desc">必要数 ${slot.requiredCount} / 判定方式: ${slot.type === 'category' ? 'カテゴリ一致' : 'アイテム名一致'}</div>
              </div>
              <div class="candidate-meta">選択済み ${selectedKeys.length} / ${slot.requiredCount}</div>
            </div>

            <div class="selected-area">
              <div class="selected-title">選択済み素材</div>
              <div class="meta-row">${renderSelectedChips(recipe, slot)}</div>
            </div>

            <div class="candidate-list">
              <table>
                <thead>
                  <tr>
                    <th>アイテム名</th>
                    <th>色</th>
                    <th>ランク</th>
                    <th>品質</th>
                    <th>使用数 / 所持数</th>
                    <th>カテゴリ</th>
                    <th>特性</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows || '<tr><td colspan="7" class="empty">該当素材がありません。</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');

      const topChips = [
        recipe.craftCount ? `<span class="chip">作成個数 ${recipe.craftCount}</span>` : '',
        recipe.difficulty ? `<span class="chip">難易度 ${recipe.difficulty}</span>` : '',
        renderRecipeTraitChip(recipe),
        recipe.manifestValue ? `<span class="chip">発現値 ${recipe.manifestValue}</span>` : '',
        `<span class="chip">選択済み ${selectedCount} / ${requiredCount}</span>`
      ].filter(Boolean).join('');

      const qualityDisplay = `<div class="quality-display">
        <div class="quality-label">完成品質</div>
        <div class="quality-value">${averageQuality === null ? '-' : averageQuality.toFixed(1)}</div>
      </div>`;

      els.recipeDetail.innerHTML = `
        <div class="recipe-top">
          <div>
            <h1 class="detail-name">
              ${escapeHtml(recipe.name)}
              ${recipe.rank ? `<span class="chip">${escapeHtml(recipe.rank)}</span>` : ''}
              ${shortage ? '<span class="chip">候補不足あり</span>' : ''}
            </h1>
            <div class="meta-row">${topChips}</div>
          </div>
          ${qualityDisplay}
        </div>

        ${recipe.notes ? `<div class="detail-section"><h2>備考</h2><div>${escapeHtml(recipe.notes)}</div></div>` : ''}

        <div class="detail-section">
          <h2>素材候補</h2>
          <div class="slot-grid">${slotHtml || '<div class="empty">素材枠がありません。</div>'}</div>
        </div>
      `;

      document.querySelectorAll('.candidate-row').forEach(row => {
        if (row.classList.contains('disabled')) return;
        row.addEventListener('click', () => {
          const slotKey = row.dataset.slotKey;
          const materialKey = row.dataset.materialKey;
          const targetSlot = recipe.slots.find(slot => getSlotKey(recipe, slot) === slotKey);
          const targetMaterial = getMaterialByKey(materialKey);
          if (!targetSlot || !targetMaterial) return;
          if (!canAddMaterial(recipe, targetSlot, targetMaterial)) return;

          addMaterialToSlot(recipe, targetSlot, materialKey);
          renderRecipeDetail();
        });
      });

      document.querySelectorAll('.chip-remove').forEach(button => {
        button.addEventListener('click', event => {
          event.stopPropagation();
          const slotKey = button.dataset.slotKey;
          const index = Number(button.dataset.index);
          const targetSlot = recipe.slots.find(slot => getSlotKey(recipe, slot) === slotKey);
          if (!targetSlot) return;
          removeMaterialFromSlot(recipe, targetSlot, index);
          renderRecipeDetail();
        });
      });
    }

    function applyRecipeSearch() {
      const q = state.recipeSearch.toLowerCase();
      state.filteredRecipes = state.recipes.filter(recipe => {
        if (!q) return true;
        return recipe.name.toLowerCase().includes(q)
          || recipe.rank.toLowerCase().includes(q)
          || recipe.traits.some(trait => trait.toLowerCase().includes(q))
          || recipe.slots.some(slot => slot.requirement.toLowerCase().includes(q));
      });

      state.selectedRecipeIndex = 0;
      renderRecipeList();
      renderRecipeDetail();
    }

    async function loadJson(url) {
      const response = await fetch(url);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return response.json();
    }

    async function initialize() {
      try {
        const [materialJson, recipeJson] = await Promise.all([
          loadJson(MATERIAL_URL),
          loadJson(RECIPE_URL)
        ]);

        state.materials = materialJson.map(parseMaterial).filter(row => row.name);
        state.recipes = recipeJson.map(parseRecipe).filter(row => row.name);

        applyRecipeSearch();
      } catch (error) {
        console.error(error);
        els.recipeList.innerHTML = '<div class="error">レシピデータの読込に失敗しました。</div>';
        els.recipeDetail.innerHTML = '<div class="error">スプレッドシートの公開状態、シート名、列名を確認してください。</div>';
      }
    }

    els.recipeSearch.addEventListener('input', event => {
      state.recipeSearch = event.target.value.trim();
      applyRecipeSearch();
    });

    initialize();
  </script>
</body>
</html>
