<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アトリエ卓 アイテム一覧</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --line: #d9dce7;
      --text: #20253a;
      --muted: #66708a;
      --accent: #4f46e5;
      --accent-soft: #eef0ff;
      --chip: #f1f3f9;
      --shadow: 0 8px 24px rgba(18, 28, 45, 0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      grid-template-columns: 1.6fr 1fr 1fr 1fr auto;
      gap: 12px;
      padding: 16px;
      margin-bottom: 16px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font-size: 14px;
    }

    .field button {
      cursor: pointer;
      background: var(--accent-soft);
      border-color: #cfd5ff;
      color: var(--accent);
      font-weight: 600;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px 12px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }

    .table-wrap {
      overflow: auto;
      border-top: 1px solid var(--line);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      background: #fafbff;
      z-index: 1;
      white-space: nowrap;
    }

    th button {
      all: unset;
      cursor: pointer;
      font-weight: 700;
    }

    tr:hover td {
      background: #fafbff;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--chip);
      color: #33405f;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .loading,
    .error,
    .empty {
      padding: 20px 16px;
      color: var(--muted);
    }

    .error {
      color: #b42318;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 16px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>アトリエ卓 アイテム一覧</h1>
      <div class="sub">
        Google スプレッドシートの公開データを読み込み、ブラウザ上でソートと絞り込みを行います。
      </div>
    </div>

    <div class="panel">
      <div class="controls">
        <div class="field">
          <label for="searchInput">名前・特性検索</label>
          <input id="searchInput" type="text" placeholder="例: 火炎石 / 破壊力増加" />
        </div>
        <div class="field">
          <label for="categorySelect">カテゴリ</label>
          <select id="categorySelect">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field">
          <label for="colorSelect">色</label>
          <select id="colorSelect">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field">
          <label for="rankSelect">ランク</label>
          <select id="rankSelect">
            <option value="">すべて</option>
          </select>
        </div>
        <div class="field">
          <label>&nbsp;</label>
          <button id="resetButton" type="button">絞り込み解除</button>
        </div>
      </div>

      <div class="meta">
        <div id="countInfo">読込中...</div>
        <div id="sortInfo">ソート: なし</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th><button data-sort="name">アイテム名</button></th>
              <th><button data-sort="price">価格</button></th>
              <th><button data-sort="color">色</button></th>
              <th><button data-sort="rank">ランク</button></th>
              <th>カテゴリ</th>
              <th><button data-sort="quality">品質</button></th>
              <th>特性</th>
              <th><button data-sort="count">個数</button></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" class="loading">データを読み込んでいます...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ここを書き換えてください
    const SHEET_ID = '1Z6aNdUNGhBTJcDJtS6XFtLAP2c8HW-ZVHjW5NwiDlJo';
    const SHEET_NAME = '探索ルール';
    const RANGE = 'A1:H1000';

    // 公開シートを JSON で取得するエンドポイント
    const SHEETS_URL = `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

    const state = {
      rows: [],
      filteredRows: [],
      sortKey: '',
      sortDir: 'asc',
      filters: {
        search: '',
        category: '',
        color: '',
        rank: ''
      }
    };

    const rankOrder = ['', 'E', 'D', 'C', 'B', 'A', 'S'];

    const els = {
      searchInput: document.getElementById('searchInput'),
      categorySelect: document.getElementById('categorySelect'),
      colorSelect: document.getElementById('colorSelect'),
      rankSelect: document.getElementById('rankSelect'),
      resetButton: document.getElementById('resetButton'),
      tableBody: document.getElementById('tableBody'),
      countInfo: document.getElementById('countInfo'),
      sortInfo: document.getElementById('sortInfo'),
      sortButtons: Array.from(document.querySelectorAll('[data-sort]'))
    };

    function normalizeText(value) {
      return String(value ?? '').trim();
    }

    function toNumber(value) {
      const num = Number(String(value ?? '').replace(/,/g, '').trim());
      return Number.isFinite(num) ? num : 0;
    }

    function splitTags(value) {
      return normalizeText(value)
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function parseRow(row) {
      return {
        name: normalizeText(row['アイテム名']),
        price: toNumber(row['価格']),
        color: normalizeText(row['色']),
        rank: normalizeText(row['ランク']).toUpperCase(),
        categories: splitTags(row['カテゴリ']),
        quality: toNumber(row['品質']),
        traits: splitTags(row['特性']),
        count: toNumber(row['個数'])
      };
    }

    function compareValues(a, b, key, dir) {
      const mul = dir === 'asc' ? 1 : -1;

      if (key === 'rank') {
        return (rankOrder.indexOf(a.rank) - rankOrder.indexOf(b.rank)) * mul;
      }

      if (['price', 'quality', 'count'].includes(key)) {
        return (a[key] - b[key]) * mul;
      }

      return String(a[key]).localeCompare(String(b[key]), 'ja') * mul;
    }

    function applyFilters() {
      const search = state.filters.search.toLowerCase();

      let rows = state.rows.filter(row => {
        const matchesSearch = !search ||
          row.name.toLowerCase().includes(search) ||
          row.traits.some(tag => tag.toLowerCase().includes(search));

        const matchesCategory = !state.filters.category || row.categories.includes(state.filters.category);
        const matchesColor = !state.filters.color || row.color === state.filters.color;
        const matchesRank = !state.filters.rank || row.rank === state.filters.rank;

        return matchesSearch && matchesCategory && matchesColor && matchesRank;
      });

      if (state.sortKey) {
        rows = [...rows].sort((a, b) => compareValues(a, b, state.sortKey, state.sortDir));
      }

      state.filteredRows = rows;
      renderTable();
      renderMeta();
    }

    function renderChips(values) {
      if (!values.length) return '';
      return `<div class="chips">${values.map(v => `<span class="chip">${escapeHtml(v)}</span>`).join('')}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderTable() {
      if (!state.filteredRows.length) {
        els.tableBody.innerHTML = '<tr><td colspan="8" class="empty">該当するデータがありません。</td></tr>';
        return;
      }

      els.tableBody.innerHTML = state.filteredRows.map(row => `
        <tr>
          <td>${escapeHtml(row.name)}</td>
          <td>${row.price}</td>
          <td>${escapeHtml(row.color || '-')}</td>
          <td>${escapeHtml(row.rank || '-')}</td>
          <td>${renderChips(row.categories)}</td>
          <td>${row.quality}</td>
          <td>${renderChips(row.traits)}</td>
          <td>${row.count}</td>
        </tr>
      `).join('');
    }

    function renderMeta() {
      els.countInfo.textContent = `${state.filteredRows.length} 件表示 / 全 ${state.rows.length} 件`;
      els.sortInfo.textContent = state.sortKey
        ? `ソート: ${state.sortKey} (${state.sortDir === 'asc' ? '昇順' : '降順'})`
        : 'ソート: なし';
    }

    function populateSelect(selectEl, values) {
      const current = selectEl.value;
      selectEl.innerHTML = '<option value="">すべて</option>' +
        values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join('');
      if (values.includes(current)) {
        selectEl.value = current;
      }
    }

    function populateFilters(rows) {
      const categories = [...new Set(rows.flatMap(row => row.categories))].sort((a, b) => a.localeCompare(b, 'ja'));
      const colors = [...new Set(rows.map(row => row.color).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ja'));
      const ranks = [...new Set(rows.map(row => row.rank).filter(Boolean))].sort((a, b) => rankOrder.indexOf(a) - rankOrder.indexOf(b));

      populateSelect(els.categorySelect, categories);
      populateSelect(els.colorSelect, colors);
      populateSelect(els.rankSelect, ranks);
    }

    async function loadData() {
      try {
        const response = await fetch(SHEETS_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const json = await response.json();
        state.rows = json
          .map(parseRow)
          .filter(row => row.name);

        populateFilters(state.rows);
        applyFilters();
      } catch (error) {
        console.error(error);
        els.tableBody.innerHTML = `
          <tr>
            <td colspan="8" class="error">
              データ取得に失敗しました。Google スプレッドシートが公開状態か、シート名が正しいか確認してください。
            </td>
          </tr>
        `;
        els.countInfo.textContent = '読込失敗';
        els.sortInfo.textContent = '-';
      }
    }

    els.searchInput.addEventListener('input', event => {
      state.filters.search = event.target.value.trim();
      applyFilters();
    });

    els.categorySelect.addEventListener('change', event => {
      state.filters.category = event.target.value;
      applyFilters();
    });

    els.colorSelect.addEventListener('change', event => {
      state.filters.color = event.target.value;
      applyFilters();
    });

    els.rankSelect.addEventListener('change', event => {
      state.filters.rank = event.target.value;
      applyFilters();
    });

    els.resetButton.addEventListener('click', () => {
      state.filters = { search: '', category: '', color: '', rank: '' };
      els.searchInput.value = '';
      els.categorySelect.value = '';
      els.colorSelect.value = '';
      els.rankSelect.value = '';
      applyFilters();
    });

    els.sortButtons.forEach(button => {
      button.addEventListener('click', () => {
        const key = button.dataset.sort;
        if (state.sortKey === key) {
          state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = key;
          state.sortDir = 'asc';
        }
        applyFilters();
      });
    });

    loadData();
  </script>
</body>
</html>
