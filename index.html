<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アトリエ卓ユーティリティ</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: sans-serif;
    }

    .menu {
      width: 200px;
      border-right: 1px solid #ccc;
      padding: 10px;
      background: #f8f8f8;
    }

    .menu button {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px;
      cursor: pointer;
    }

    iframe {
      flex: 1;
      border: none;
    }
  </style>
</head>
<body>

  <div class="menu">
    <button onclick="loadPage('item.html')">素材一覧</button>
    <button onclick="loadPage('recipe.html')">レシピ</button>
  </div>

  <iframe id="mainFrame" src="item.html"></iframe>

  <script>
    function loadPage(page) {
      document.getElementById('mainFrame').src = page;
    }
  </script>

</body>
</html>
